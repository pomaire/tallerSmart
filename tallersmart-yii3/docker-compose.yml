version: '3.8'

services:
  # Servidor Nginx
  nginx:
    image: nginx:alpine
    container_name: tallersmart-nginx
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    networks:
      - tallersmart-network

  # PHP 8.2 FPM
  php:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: tallersmart-php
    volumes:
      - ./:/var/www/html
      - ./logs:/var/www/html/logs
    working_dir: /var/www/html
    depends_on:
      - mysql
    networks:
      - tallersmart-network
    environment:
      - DB_HOST=mysql
      - DB_NAME=tallersmart
      - DB_USER=tallersmart
      - DB_PASSWORD=tallersmart123

  # MySQL 8
  mysql:
    image: mysql:8.0
    container_name: tallersmart-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: tallersmart
      MYSQL_USER: tallersmart
      MYSQL_PASSWORD: tallersmart123
      MYSQL_ROOT_PASSWORD: rootpassword123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - tallersmart-network
    command: --default-authentication-plugin=mysql_native_password

  # phpMyAdmin (opcional para gestión de BD)
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: tallersmart-phpmyadmin
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: rootpassword123
    ports:
      - "8081:80"
    depends_on:
      - mysql
    networks:
      - tallersmart-network

networks:
  tallersmart-network:
    driver: bridge

volumes:
  mysql_data:
    driver: local
