services:
  # Servidor Nginx
  nginx:
    image: nginx:alpine
    container_name: tallersmart-nginx
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
      - vendor_data:/var/www/html/vendor
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    networks:
      - tallersmart-network

  # PHP 8.2 FPM
  php:
    build:
      context: .
      dockerfile: ./docker/php/Dockerfile
    container_name: tallersmart-php
    volumes:
      - ./:/var/www/html
      - vendor_data:/var/www/html/vendor
      - ./logs:/var/www/html/logs
      - ./.env:/var/www/html/.env
    working_dir: /var/www/html
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - tallersmart-network
    environment:
      - APP_ENV=dev
      - APP_KEY=${APP_KEY}
      - APP_URL=${APP_URL}
      - DB_HOST=mysql
      - DB_NAME=tallersmart
      - DB_USER=tallersmart
      - DB_PASSWORD=tallersmart123
    healthcheck:
      test: ["CMD", "true"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  # MySQL 8
  mysql:
    image: mysql:8.0
    container_name: tallersmart-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: tallersmart
      MYSQL_USER: tallersmart
      MYSQL_PASSWORD: tallersmart123
      MYSQL_ROOT_PASSWORD: rootpassword123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - tallersmart-network
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword123"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # phpMyAdmin (opcional para gestión de BD)
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: tallersmart-phpmyadmin
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: rootpassword123
    ports:
      - "8081:80"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - tallersmart-network

networks:
  tallersmart-network:
    driver: bridge

volumes:
  mysql_data:
    driver: local
  vendor_data:
    driver: local
